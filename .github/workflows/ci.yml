name: ZapDin App — CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Lint & Syntax ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (ast.parse all .py)
        run: |
          python - <<'EOF'
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path("app").rglob("*.py"):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"✅ {len(list(pathlib.Path('app').rglob('*.py')))} arquivos OK")
          EOF

      - name: Import check (dry-run)
        env:
          APP_STATE: active
          PORT: "4000"
          DATABASE_URL: postgresql://zapdin:zapdin@localhost:5432/zapdin_app
          SECRET_KEY: ci-secret-key-not-for-production-use
          MONITOR_URL: http://localhost:5000
          MONITOR_CLIENT_TOKEN: ci-token
          CLIENT_NAME: CI
          CLIENT_CNPJ: "00000000000000"
        run: |
          python -c "
          # Importa módulos principais sem subir o servidor
          import sys; sys.path.insert(0, '.')
          from app.core.config import settings
          from app.core.rate_limiter import login_limiter, erp_limiter, activation_limiter
          from app.core.dependencies import client_ip, empresa_id_from
          from app.domain.entities import Mensagem, Contato, Campanha
          from app.domain.exceptions import DomainError, CampanhaNaoEncontrada
          from app.repositories.base import BaseRepository
          print('✅ Imports OK')
          "

  # ── 2. Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zapdin
          POSTGRES_PASSWORD: zapdin_ci
          POSTGRES_DB: zapdin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zapdin"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          APP_STATE: active
          DATABASE_URL: postgresql://zapdin:zapdin_ci@localhost:5432/zapdin_test
          SECRET_KEY: ci-secret-key-not-for-production-use
          MONITOR_URL: http://localhost:5000
          MONITOR_CLIENT_TOKEN: ci-token
          CLIENT_NAME: CI Test
          CLIENT_CNPJ: "00000000000000"
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "⚠️  Nenhum teste encontrado ainda"

  # ── 3. Deploy produção (só push em main) ─────────────────────────────────────
  deploy:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Sync para servidor via rsync
        env:
          SSH_HOST:    ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT:    ${{ secrets.PROD_SSH_PORT }}
          SSH_USER:    ${{ secrets.PROD_SSH_USER }}
          SSH_PASS:    ${{ secrets.PROD_SSH_PASS }}
          REMOTE_PATH: ${{ secrets.PROD_APP_PATH }}
        run: |
          which sshpass || (sudo apt-get update -q && sudo apt-get install -y sshpass rsync)
          rsync -avz --progress \
            --exclude='.venv' --exclude='__pycache__' \
            --exclude='data/' --exclude='.env' --exclude='*.pyc' \
            -e "sshpass -p '$SSH_PASS' ssh -p $SSH_PORT \
                  -o StrictHostKeyChecking=no \
                  -o PreferredAuthentications=password \
                  -o PubkeyAuthentication=no" \
            app/ \
            "$SSH_USER@$SSH_HOST:$REMOTE_PATH"

      - name: Restart app no servidor
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PASS: ${{ secrets.PROD_SSH_PASS }}
        run: |
          sshpass -p "$SSH_PASS" ssh -p $SSH_PORT \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "$SSH_USER@$SSH_HOST" \
            'kill $(lsof -ti:4000) 2>/dev/null; sleep 2;
             cd /home/master/Zapdin2 &&
             setsid app/.venv/bin/python -m uvicorn app.main:app \
               --host 0.0.0.0 --port 4000 > /tmp/zapdin_app.log 2>&1 & sleep 3 &&
             curl -sf http://localhost:4000/api/activate/status && echo " deploy ok"'

      - name: Notifica resultado
        if: always()
        run: |
          echo "Deploy job status: ${{ job.status }}"
