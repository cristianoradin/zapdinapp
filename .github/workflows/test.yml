name: Testes Automatizados

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Job 1: Linux + PostgreSQL ───────────────────────────────────────────────
  test-linux:
    name: Linux (lógica de negócio)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zapdin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Instalar Playwright (necessário para import do app)
        run: python -m playwright install chromium --with-deps

      - name: Rodar testes
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zapdin_test
        run: pytest tests/ -v --tb=short --no-header

      - name: Relatório de cobertura
        if: always()
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zapdin_test
        run: |
          coverage run -m pytest tests/ -q --no-header
          coverage report --include="app/routers/*,app/core/*" --skip-empty

  # ── Job 2: Windows — verifica o que o Linux não consegue testar ────────────
  # O Linux cobre todos os 21 testes de lógica de negócio com PostgreSQL.
  # O Windows verifica: imports corretos no Python Windows e encoding UTF-8 BOM
  # (Bloco de Notas grava com BOM — causa silenciosa de token vazio em produção).
  test-windows:
    name: Windows (imports + encoding)
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright (necessário para import do app)
        run: python -m playwright install chromium

      - name: Smoke test — app importa sem erros no Windows
        shell: pwsh
        run: |
          python -c "
          import os
          os.environ.update({
              'APP_STATE':            'locked',
              'DATABASE_URL':         'postgresql://postgres@localhost/zapdin_test',
              'MONITOR_URL':          'http://monitor.test',
              'MONITOR_CLIENT_TOKEN': '',
              'SECRET_KEY':           'a' * 64,
              'PORT':                 '4001',
              'CLIENT_NAME':          'Teste',
              'CLIENT_CNPJ':          '12345678000195',
          })
          from app.core.config import settings
          from app.core import security, database
          from app.routers import auth, activation
          print('OK: todos os imports do app funcionaram no Windows')
          "

      - name: Verificar encoding UTF-8 BOM do .env (regressão Bloco de Notas)
        shell: pwsh
        run: |
          # O Bloco de Notas do Windows grava UTF-8 com BOM por padrão.
          # pydantic-settings com utf-8-sig deve ler corretamente sem BOM no valor.
          $utf8Bom = New-Object System.Text.UTF8Encoding $true
          $conteudo = "APP_STATE=active`r`nMONITOR_CLIENT_TOKEN=test-token-windows`r`nSECRET_KEY=$('a' * 64)`r`nPORT=4001`r`n"
          [System.IO.File]::WriteAllText("app\.env.test", $conteudo, $utf8Bom)
          Write-Host "Arquivo .env gravado com BOM UTF-8."

          python -c "
          import os
          os.environ['DATABASE_URL'] = 'postgresql://postgres@localhost/zapdin_test'
          from app.core.config import Settings
          s = Settings(_env_file='app/.env.test')
          assert s.app_state == 'active', f'app_state errado: {s.app_state!r}'
          assert s.monitor_client_token == 'test-token-windows', f'token errado: {s.monitor_client_token!r}'
          print('OK: .env gravado com BOM pelo Bloco de Notas lido corretamente')
          "

          # Limpa o arquivo de teste
          Remove-Item "app\.env.test" -ErrorAction SilentlyContinue
