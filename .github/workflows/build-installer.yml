name: Build ZapDin-Setup.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: powershell

      - name: Instalar Playwright (para empacotar)
        run: |
          python -m playwright install chromium
        shell: powershell

      - name: Compilar ZapDinApp.exe com PyInstaller
        run: |
          pyinstaller zapdinapp.spec --noconfirm --clean
        shell: powershell

      - name: Verificar saída do PyInstaller
        run: |
          if (Test-Path "dist\ZapDinApp\ZapDinApp.exe") {
            $size = (Get-Item "dist\ZapDinApp\ZapDinApp.exe").Length / 1MB
            Write-Host "ZapDinApp.exe gerado: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "ZapDinApp.exe NÃO foi gerado!"
            exit 1
          }
        shell: powershell

      - name: Instalar Inno Setup 6
        run: |
          choco install innosetup --yes --no-progress
        shell: powershell

      - name: Compilar ZapDin-Setup.exe com Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador\setup.iss
        shell: powershell

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ZapDin-Setup
          path: instalador\ZapDin-Setup.exe
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ZapDin App v${{ github.run_number }}"
          body: |
            ### Instalador Windows — ZapDin App

            **Baixe o `ZapDin-Setup.exe` e execute na máquina do cliente.**

            ✅ Python já embutido — não precisa instalar Python
            ✅ Instala PostgreSQL 16 automaticamente
            ✅ Configura serviço Windows (auto-start)
            ✅ Só pede o Token do cliente

          files: instalador\ZapDin-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
