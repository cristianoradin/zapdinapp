name: Build ZapDin-Setup.exe

on:
  # Dispara SOMENTE após o workflow de testes concluir com sucesso no main.
  # Isso garante que nenhum instalador seja gerado com testes falhando.
  workflow_run:
    workflows: ["Testes Automatizados"]
    types: [completed]
    branches: [ main ]
  # Permite disparar manualmente (ex: hotfix urgente após aprovação manual)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Aborta se os testes falharam (só executa quando conclusão = success)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: powershell

      - name: Instalar Playwright Chromium
        run: |
          python -m playwright install chromium
        shell: powershell

      - name: Compilar ZapDinApp.exe com PyInstaller
        run: |
          pyinstaller zapdinapp.spec --noconfirm --clean
        shell: powershell

      - name: Verificar saída do PyInstaller
        run: |
          if (Test-Path "dist\ZapDinApp\ZapDinApp.exe") {
            $size = (Get-Item "dist\ZapDinApp\ZapDinApp.exe").Length / 1MB
            Write-Host "ZapDinApp.exe gerado: $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "ZapDinApp.exe NÃO foi gerado!"
            exit 1
          }
        shell: powershell

      - name: Empacotar Chromium junto com o app
        run: |
          $src = "$env:LOCALAPPDATA\ms-playwright"
          $dst = "dist\ZapDinApp\ms-playwright"
          if (Test-Path $src) {
            Write-Host "Copiando Playwright browsers de $src para $dst ..."
            Copy-Item -Path $src -Destination $dst -Recurse -Force
            $sizeMB = (Get-ChildItem $dst -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "Browsers embutidos: $([math]::Round($sizeMB, 1)) MB"
          } else {
            Write-Error "Pasta ms-playwright não encontrada: $src"
            exit 1
          }
        shell: powershell

      - name: Instalar Inno Setup 6
        run: |
          choco install innosetup --yes --no-progress
        shell: powershell

      - name: Compilar ZapDin-Setup.exe com Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador\setup.iss
        shell: powershell

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ZapDin-Setup
          path: instalador\ZapDin-Setup.exe
          retention-days: 30

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ZapDin App v${{ github.run_number }}"
          body: |
            ### Instalador Windows — ZapDin App

            **Baixe o `ZapDin-Setup.exe` e execute na máquina do cliente.**

            ✅ Python já embutido — não precisa instalar Python
            ✅ Chromium já embutido — não baixa nada durante a instalação
            ✅ Instala PostgreSQL 16 automaticamente (ou usa o existente)
            ✅ Configura serviço Windows (auto-start)
            ✅ Só pede o Token do cliente

          files: instalador\ZapDin-Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
