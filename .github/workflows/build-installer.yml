name: Build ZapDin-Setup.exe

on:
  # Dispara manualmente pela aba Actions → workflow_dispatch
  workflow_dispatch:
  # Ou ao fazer push de tag v* (ex: git tag v1.3.4 && git push --tags)
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # necessário para criar releases

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Lê a versão de app/versao.json ─────────────────────────────────
      - name: Ler versão do app
        id: version
        run: |
          $ver = (Get-Content app\versao.json | ConvertFrom-Json).versao
          echo "APP_VERSION=$ver" >> $env:GITHUB_ENV
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Versão: $ver"
        shell: powershell

      # ── 3. Python + dependências ───────────────────────────────────────────
      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pyinstaller
        shell: powershell

      # ── 4. Playwright Chromium ─────────────────────────────────────────────
      - name: Instalar Playwright Chromium
        run: python -m playwright install chromium --with-deps
        shell: powershell

      # ── 5. Compila ZapDinApp.exe com PyInstaller ───────────────────────────
      - name: Compilar com PyInstaller
        run: pyinstaller zapdinapp.spec --noconfirm --clean
        shell: powershell

      - name: Verificar build
        run: |
          $exe = "dist\ZapDinApp\ZapDinApp.exe"
          if (-not (Test-Path $exe)) { Write-Error "EXE não gerado!"; exit 1 }
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "ZapDinApp.exe gerado: ${mb} MB"
        shell: powershell

      # ── 6. Embute Chromium em dist\ZapDinApp\ ──────────────────────────────
      - name: Empacotar Chromium
        run: |
          $src = "$env:LOCALAPPDATA\ms-playwright"
          $dst = "dist\ZapDinApp\ms-playwright"
          if (-not (Test-Path $src)) { Write-Error "ms-playwright não encontrado: $src"; exit 1 }
          Copy-Item -Path $src -Destination $dst -Recurse -Force
          $mb = [math]::Round((Get-ChildItem $dst -Recurse | Measure-Object Length -Sum).Sum / 1MB, 0)
          Write-Host "Chromium embutido: ${mb} MB"
        shell: powershell

      # ── 7. Atualiza versão no setup.iss ────────────────────────────────────
      - name: Atualizar versão no instalador
        run: |
          $ver = $env:APP_VERSION
          $iss = Get-Content instalador\setup.iss -Raw
          # Substitui a linha AppVersion
          $iss = $iss -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion `"$ver`""
          Set-Content instalador\setup.iss $iss -Encoding UTF8
          Write-Host "setup.iss atualizado para v$ver"
        shell: powershell

      # ── 8. Inno Setup ──────────────────────────────────────────────────────
      - name: Instalar Inno Setup 6
        run: choco install innosetup --yes --no-progress
        shell: powershell

      - name: Compilar ZapDin-Setup.exe
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" instalador\setup.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup falhou!"; exit 1 }
        shell: powershell

      - name: Renomear Setup.exe com versão
        run: |
          $ver = $env:APP_VERSION
          $src = "instalador\ZapDin-Setup.exe"
          $dst = "instalador\ZapDin-Setup-${ver}.exe"
          if (-not (Test-Path $src)) {
            # Tenta o nome gerado pelo OutputBaseFilename
            $src = Get-ChildItem instalador -Filter "ZapDin-Setup*.exe" | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($src -and (Test-Path $src)) {
            Copy-Item $src $dst -Force
            $mb = [math]::Round((Get-Item $dst).Length / 1MB, 0)
            Write-Host "Setup gerado: ZapDin-Setup-${ver}.exe (${mb} MB)"
            echo "SETUP_PATH=$dst" >> $env:GITHUB_ENV
          } else {
            Write-Error "Setup.exe não encontrado!"; exit 1
          }
        shell: powershell

      # ── 9. Upload como artefato ────────────────────────────────────────────
      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: ZapDin-Setup-${{ env.APP_VERSION }}
          path: instalador\ZapDin-Setup-${{ env.APP_VERSION }}.exe
          retention-days: 90

      # ── 10. GitHub Release ─────────────────────────────────────────────────
      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "ZapDin App v${{ env.APP_VERSION }}"
          body: |
            ## ZapDin App v${{ env.APP_VERSION }} — Instalador Windows

            **Baixe `ZapDin-Setup-${{ env.APP_VERSION }}.exe` e execute como Administrador na máquina do cliente.**

            ### O instalador faz automaticamente:
            - ✅ Instala o app em `C:\ZapDinApp\`
            - ✅ Python + Chromium já embutidos (sem downloads adicionais)
            - ✅ Cria o banco `zapdin_app` no PostgreSQL local
            - ✅ Configura serviço Windows (inicia no login)
            - ✅ Pede apenas: senha do PostgreSQL + Token do Monitor

            ### Como obter o Token:
            Acesse o Monitor → Clientes → (cliente) → copie o **Token de Ativação**

          files: instalador\ZapDin-Setup-${{ env.APP_VERSION }}.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
