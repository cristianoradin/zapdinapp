<div class="page" id="page-ctb-empresas">

      <!-- Grid de empresas (tela toda) -->
      <div class="card" style="margin-bottom:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
          <div class="section-header" style="margin-bottom:0">
            <div class="section-header-icon shi-green">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <h2>Empresas Cadastradas</h2>
          </div>
          <button class="btn btn-primary btn-sm" onclick="ctbEmpresas.novaEmpresa()">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nova Empresa
          </button>
        </div>
        <div class="ctb-search-wrap" style="margin-bottom:.85rem">
          <svg class="ctb-search-ico" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="ctbEmpSearch" class="ctb-search-input" placeholder="Buscar por nome, CNPJ ou telefone…" oninput="ctbEmpresas.buscar(this.value)">
        </div>
        <div class="alert" id="alertCtbEmpLista"></div>
        <div class="ctb-emp-list" id="ctbEmpLista">
          <div class="ctb-table-empty">Carregando empresas…</div>
        </div>
      </div>
    </div>
