<div class="page" id="page-dm-dashboard">


      <!-- Filtro por campanha -->
      <div class="card" style="margin-bottom:1rem;padding:.875rem 1.25rem">
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
          <label style="font-weight:600;font-size:.85rem;white-space:nowrap">Filtrar por campanha:</label>
          <select id="dashCampanhaSelect" onchange="loadDashboardCampanhas()" style="flex:1;min-width:200px;max-width:380px;padding:.4rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit;background:var(--surface2)">
            <option value="">— Todas as campanhas —</option>
          </select>
          <select id="dashDiasSelect" onchange="loadDashboardCampanhas()" style="padding:.4rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit;background:var(--surface2)">
            <option value="7">Últimos 7 dias</option>
            <option value="30" selected>Últimos 30 dias</option>
            <option value="90">Últimos 90 dias</option>
            <option value="365">Último ano</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadDashboardCampanhas()" style="display:inline-flex;align-items:center;gap:.3rem">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Atualizar
          </button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div id="dashKpiRow" style="display:grid;grid-template-columns:repeat(6,1fr);gap:1rem;margin-bottom:1rem;overflow-x:auto">
        <div class="card dash-kpi-card" id="dkpi-enviados">
          <div class="dkpi-icon" style="background:#dcfce7;color:#15803d">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </div>
          <div class="dkpi-val" id="dval-enviados">—</div>
          <div class="dkpi-label">Enviados</div>
          <div class="dkpi-sub" id="dsub-enviados"></div>
        </div>
        <div class="card dash-kpi-card" id="dkpi-falhas">
          <div class="dkpi-icon" style="background:#fee2e2;color:#dc2626">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
          <div class="dkpi-val" id="dval-falhas" style="color:#dc2626">—</div>
          <div class="dkpi-label">Falhas</div>
          <div class="dkpi-sub" id="dsub-falhas"></div>
        </div>
        <div class="card dash-kpi-card">
          <div class="dkpi-icon" style="background:#dbeafe;color:#2563eb">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div class="dkpi-val" id="dval-taxa" style="color:#2563eb">—</div>
          <div class="dkpi-label">Taxa de Sucesso</div>
          <div class="dkpi-sub" id="dsub-taxa"></div>
        </div>
        <div class="card dash-kpi-card">
          <div class="dkpi-icon" style="background:#fef9c3;color:#ca8a04">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </div>
          <div class="dkpi-val" id="dval-campanhas" style="color:#ca8a04">—</div>
          <div class="dkpi-label">Campanhas</div>
          <div class="dkpi-sub" id="dsub-campanhas"></div>
        </div>
        <div class="card dash-kpi-card">
          <div class="dkpi-icon" style="background:#f3e8ff;color:#9333ea">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div class="dkpi-val" id="dval-contatos" style="color:#9333ea">—</div>
          <div class="dkpi-label">Contatos Únicos</div>
          <div class="dkpi-sub" id="dsub-contatos"></div>
        </div>
        <div class="card dash-kpi-card">
          <div class="dkpi-icon" style="background:#ffedd5;color:#ea580c">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="dkpi-val" id="dval-duracao" style="color:#ea580c">—</div>
          <div class="dkpi-label">Duração Média</div>
          <div class="dkpi-sub" id="dsub-duracao"></div>
        </div>
      </div>

      <!-- Gráficos Row 1 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem" id="dashRow1">
        <div class="card">
          <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
            <span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;display:inline-block"></span>
            Distribuição por Status
          </div>
          <div style="position:relative;height:220px;display:flex;align-items:center;justify-content:center">
            <canvas id="chartDonut"></canvas>
          </div>
          <div id="dashDonutLegend" style="display:flex;justify-content:center;gap:1.5rem;margin-top:.75rem;flex-wrap:wrap;font-size:.78rem"></div>
        </div>
        <div class="card">
          <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
            <span style="width:10px;height:10px;border-radius:50%;background:#8b5cf6;display:inline-block"></span>
            Envios por Hora do Dia
          </div>
          <div style="position:relative;height:220px">
            <canvas id="chartHora"></canvas>
          </div>
          <div style="font-size:.72rem;color:var(--text-mid);margin-top:.5rem;text-align:center">Distribuição dos envios ao longo do dia</div>
        </div>
      </div>

      <!-- Gráfico evolução diária -->
      <div class="card" style="margin-bottom:1rem">
        <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
          <span style="width:10px;height:10px;border-radius:50%;background:#10b981;display:inline-block"></span>
          Evolução de Envios por Dia
        </div>
        <div style="position:relative;height:200px">
          <canvas id="chartDia"></canvas>
        </div>
      </div>

      <!-- Ranking campanhas + Top contatos -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem" id="dashRow2">
        <!-- Ranking campanhas -->
        <div class="card">
          <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
            <span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block"></span>
            Ranking de Campanhas
          </div>
          <div id="dashRankingCampanhas" style="display:flex;flex-direction:column;gap:.6rem"></div>
        </div>
        <!-- Top contatos -->
        <div class="card">
          <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
            <span style="width:10px;height:10px;border-radius:50%;background:#ec4899;display:inline-block"></span>
            Top Contatos Alcançados
          </div>
          <div id="dashTopContatos" style="display:flex;flex-direction:column;gap:.5rem"></div>
        </div>
      </div>

      <!-- Gráfico barras horizontal campanhas -->
      <div class="card" style="margin-bottom:1rem">
        <div style="font-weight:700;font-size:.88rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
          <span style="width:10px;height:10px;border-radius:50%;background:#3d7f1f;display:inline-block"></span>
          Comparativo de Campanhas (Enviados vs Falhas)
        </div>
        <div style="position:relative;height:280px">
          <canvas id="chartBarCampanhas"></canvas>
        </div>
      </div>

    </div>
