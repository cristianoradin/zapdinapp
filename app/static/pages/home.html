<div class="page active" id="page-home">
  <div class="hd-root">

    <!-- ── HERO ROW ─────────────────────────────────────── -->
    <div class="hd-hero">

      <!-- Relógio -->
      <div class="hd-clock-card">
        <div class="hd-clock-glow"></div>
        <div class="hd-clock-body">
          <div class="hd-clock-time" id="home-time">00:00</div>
          <div class="hd-clock-meta">
            <span id="home-date">--/--/----</span>
            <span class="hd-clock-sep">·</span>
            <span id="home-day">--</span>
          </div>
        </div>
      </div>

      <!-- Clima -->
      <div class="hd-weather-card" id="home-clima-card">
        <div class="hd-weather-main">
          <div class="hd-weather-icon" id="home-clima-icon">🌤️</div>
          <div class="hd-weather-temp" id="home-clima-temp">--°</div>
          <div class="hd-weather-info">
            <div class="hd-weather-city" id="home-clima-city">--</div>
            <div class="hd-weather-desc" id="home-clima-desc">--</div>
            <div class="hd-weather-details">
              <span>💧<span id="home-clima-umid">--</span></span>
              <span>💨<span id="home-clima-vento">--</span></span>
            </div>
          </div>
        </div>
        <div class="hd-weather-forecast" id="home-clima-forecast"></div>
        <button class="hd-weather-cfg-btn" title="Configurar cidade" onclick="homeToggleClimaConfig()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        </button>
        <div class="hd-weather-cfg" id="home-clima-config" style="display:none">
          <input type="text" id="home-clima-cidade-input" placeholder="Cidade" class="hd-input-sm">
          <input type="text" id="home-clima-uf-input" placeholder="UF" class="hd-input-sm" maxlength="2" style="width:52px">
          <button onclick="homeSalvarCidade()" class="hd-btn-xs hd-btn-ok">✓</button>
          <button onclick="homeToggleClimaConfig()" class="hd-btn-xs hd-btn-cancel">✕</button>
        </div>
      </div>

      <!-- KPIs -->
      <div class="hd-kpis">
        <div class="hd-kpi" id="hd-kpi-hoje">
          <div class="hd-kpi-icon hd-kpi-green">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </div>
          <div>
            <div class="hd-kpi-val" id="hd-kpi-hoje-val">--</div>
            <div class="hd-kpi-label">Envios hoje</div>
          </div>
        </div>
        <div class="hd-kpi" id="hd-kpi-wa">
          <div class="hd-kpi-icon hd-kpi-blue">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div>
            <div class="hd-kpi-val" id="hd-kpi-wa-val">--</div>
            <div class="hd-kpi-label">WhatsApp ativo</div>
          </div>
        </div>
        <div class="hd-kpi" id="hd-kpi-fila">
          <div class="hd-kpi-icon hd-kpi-amber">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </div>
          <div>
            <div class="hd-kpi-val" id="hd-kpi-fila-val">--</div>
            <div class="hd-kpi-label">Na fila</div>
          </div>
        </div>
        <div class="hd-kpi" id="hd-kpi-total">
          <div class="hd-kpi-icon hd-kpi-purple">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </div>
          <div>
            <div class="hd-kpi-val" id="hd-kpi-total-val">--</div>
            <div class="hd-kpi-label">Total enviados</div>
          </div>
        </div>
      </div>

    </div><!-- /hero -->

    <!-- ── MAIN GRID ─────────────────────────────────────── -->
    <div class="hd-grid">

      <!-- COL A: Calendário -->
      <div class="hd-col hd-col-cal">
        <div class="hd-card">
          <div class="hd-card-head">
            <div class="hd-card-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Agenda
            </div>
            <div class="hd-cal-nav-row">
              <button class="hd-icon-btn" onclick="homeCalNav(-1)">‹</button>
              <span class="hd-cal-month" id="home-cal-month">Mai 2026</span>
              <button class="hd-icon-btn" onclick="homeCalNav(1)">›</button>
            </div>
          </div>
          <div class="hd-cal-weekdays">
            <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
          </div>
          <div class="hd-cal-days" id="home-cal-days"></div>
          <!-- Próximos compromissos -->
          <div class="hd-next-events" id="hd-next-events"></div>
        </div>
      </div>

      <!-- COL B: Post-its -->
      <div class="hd-col hd-col-notes">
        <div class="hd-card hd-card-fill">
          <div class="hd-card-head">
            <div class="hd-card-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Anotações
            </div>
            <button class="hd-btn-add" onclick="homeNovoPostit()">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Nova
            </button>
          </div>
          <div class="hd-notes-grid" id="home-postits-grid"></div>
        </div>
      </div>

      <!-- COL C: Avisos + Ações Rápidas -->
      <div class="hd-col hd-col-right">

        <!-- Avisos -->
        <div class="hd-card">
          <div class="hd-card-head">
            <div class="hd-card-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              Avisos
            </div>
            <span class="hd-badge" id="home-recados-badge">0</span>
          </div>
          <div class="hd-recados-list" id="home-recados-list">
            <div class="hd-empty">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.25;margin-bottom:.4rem"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              Nenhum aviso no momento
            </div>
          </div>
        </div>

        <!-- Ações rápidas -->
        <div class="hd-card hd-quick-actions-card">
          <div class="hd-card-head">
            <div class="hd-card-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Ações Rápidas
            </div>
          </div>
          <div class="hd-quick-actions">
            <button class="hd-qa-btn" onclick="navigate('whatsapp')">
              <div class="hd-qa-icon hd-qa-green">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <span>WhatsApp</span>
            </button>
            <button class="hd-qa-btn" onclick="navigate('dm-campanha')">
              <div class="hd-qa-icon hd-qa-blue">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </div>
              <span>Campanha</span>
            </button>
            <button class="hd-qa-btn" onclick="navigate('dashboard')">
              <div class="hd-qa-icon hd-qa-purple">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </div>
              <span>Envios</span>
            </button>
            <button class="hd-qa-btn" onclick="navigate('ia-central')">
              <div class="hd-qa-icon hd-qa-amber">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z"/></svg>
              </div>
              <span>IA Central</span>
            </button>
          </div>
        </div>

      </div><!-- /col-right -->

    </div><!-- /grid -->

  </div><!-- /root -->

  <!-- ── MODAL AGENDA ─────────────────────────── -->
  <div class="home-modal-overlay" id="home-agenda-overlay" onclick="homeFecharAgenda(event)">
    <div class="home-modal">
      <div class="home-modal-header">
        <h3>Agenda — <span id="home-agenda-data-label"></span></h3>
        <button onclick="homeFecharAgenda(null, true)" class="home-modal-close">✕</button>
      </div>
      <div class="home-agenda-lista" id="home-agenda-lista"></div>
      <div class="home-agenda-form">
        <input type="hidden" id="home-agenda-id">
        <input type="text" id="home-agenda-titulo" placeholder="Título do compromisso" class="home-input">
        <div style="display:flex;gap:.5rem">
          <input type="time" id="home-agenda-inicio" class="home-input">
          <input type="time" id="home-agenda-fim" class="home-input">
        </div>
        <textarea id="home-agenda-desc" placeholder="Descrição (opcional)" class="home-input" rows="2"></textarea>
        <div class="home-agenda-cores">
          <span>Cor:</span>
          <label><input type="radio" name="agenda-cor" value="#3d7f1f" checked> <span style="background:#3d7f1f" class="home-cor-dot"></span></label>
          <label><input type="radio" name="agenda-cor" value="#3b82f6"> <span style="background:#3b82f6" class="home-cor-dot"></span></label>
          <label><input type="radio" name="agenda-cor" value="#ef4444"> <span style="background:#ef4444" class="home-cor-dot"></span></label>
          <label><input type="radio" name="agenda-cor" value="#f59e0b"> <span style="background:#f59e0b" class="home-cor-dot"></span></label>
          <label><input type="radio" name="agenda-cor" value="#8b5cf6"> <span style="background:#8b5cf6" class="home-cor-dot"></span></label>
        </div>
        <div style="display:flex;gap:.5rem;justify-content:flex-end">
          <button class="home-btn-cancel" onclick="homeLimparAgendaForm()">Cancelar</button>
          <button class="home-btn-save" onclick="homeSalvarAgenda()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── MODAL POST-IT ────────────────────────── -->
  <div class="home-modal-overlay" id="home-postit-overlay" onclick="homeFecharPostit(event)">
    <div class="home-modal home-postit-modal" id="home-postit-modal-inner">
      <div class="home-modal-header">
        <h3>Anotação</h3>
        <button onclick="homeFecharPostit(null, true)" class="home-modal-close">✕</button>
      </div>
      <input type="hidden" id="home-postit-id">
      <input type="text" id="home-postit-titulo" placeholder="Título" class="home-input">
      <textarea id="home-postit-conteudo" placeholder="Escreva sua anotação..." class="home-input home-postit-textarea" rows="6"></textarea>
      <div class="home-postit-cores">
        <span>Cor:</span>
        <label><input type="radio" name="postit-cor" value="#fef08a" checked> <span style="background:#fef08a" class="home-cor-dot"></span></label>
        <label><input type="radio" name="postit-cor" value="#bbf7d0"> <span style="background:#bbf7d0" class="home-cor-dot"></span></label>
        <label><input type="radio" name="postit-cor" value="#bfdbfe"> <span style="background:#bfdbfe" class="home-cor-dot"></span></label>
        <label><input type="radio" name="postit-cor" value="#fecaca"> <span style="background:#fecaca" class="home-cor-dot"></span></label>
        <label><input type="radio" name="postit-cor" value="#e9d5ff"> <span style="background:#e9d5ff" class="home-cor-dot"></span></label>
        <label><input type="radio" name="postit-cor" value="#fed7aa"> <span style="background:#fed7aa" class="home-cor-dot"></span></label>
      </div>
      <div style="display:flex;gap:.5rem;justify-content:space-between;margin-top:.5rem">
        <button class="home-btn-cancel home-btn-danger" id="home-postit-del-btn" onclick="homeDeletarPostit()" style="display:none">🗑 Excluir</button>
        <div style="display:flex;gap:.5rem;margin-left:auto">
          <button class="home-btn-cancel" onclick="homeFecharPostit(null,true)">Cancelar</button>
          <button class="home-btn-save" onclick="homeSalvarPostit()">Salvar</button>
        </div>
      </div>
    </div>
  </div>

</div>
