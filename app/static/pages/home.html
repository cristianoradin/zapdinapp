<div class="page active" id="page-home">
      <div class="home-wrapper">

        <!-- ── TOP BAR: Relógio + Clima ─────────────────────── -->
        <div class="home-topbar">

          <!-- Relógio compacto -->
          <div class="home-card home-clock-card">
            <div class="home-clock-inner">
              <div class="home-clock-left">
                <div class="home-clock-time" id="home-time">00:00</div>
              </div>
              <div class="home-clock-right">
                <div class="home-clock-date" id="home-date">carregando...</div>
                <div class="home-clock-day" id="home-day"></div>
              </div>
            </div>
          </div>

          <!-- Clima compacto -->
          <div class="home-card home-clima-card" id="home-clima-card">
            <div class="home-clima-inner">
              <div class="home-clima-main-block">
                <div class="home-clima-icon" id="home-clima-icon">🌤️</div>
                <div>
                  <div class="home-clima-temp" id="home-clima-temp">--°C</div>
                  <div class="home-clima-city" id="home-clima-city">--</div>
                </div>
              </div>
              <div class="home-clima-sep"></div>
              <div class="home-clima-details-block">
                <div class="home-clima-desc" id="home-clima-desc">--</div>
                <div class="home-clima-details">
                  <span>💧 <span id="home-clima-umid">--</span></span>
                  <span>💨 <span id="home-clima-vento">--</span></span>
                </div>
              </div>
              <div class="home-clima-sep"></div>
              <div class="home-clima-forecast" id="home-clima-forecast"></div>
              <div class="home-clima-edit-btn" title="Configurar cidade" onclick="homeToggleClimaConfig()">⚙️</div>
            </div>
            <div class="home-clima-config" id="home-clima-config" style="display:none">
              <input type="text" id="home-clima-cidade-input" placeholder="Cidade" class="home-input-sm">
              <input type="text" id="home-clima-uf-input" placeholder="UF" class="home-input-sm" maxlength="2" style="width:55px">
              <button onclick="homeSalvarCidade()" class="home-btn-sm">✓ Salvar</button>
              <button onclick="homeToggleClimaConfig()" class="home-btn-sm" style="background:#888">✕</button>
            </div>
          </div>

        </div>

        <!-- ── CONTEÚDO: 3 colunas ────────────────────────── -->
        <div class="home-content">

          <!-- COL 1: Calendário -->
          <div class="home-col home-col-left">
            <div class="home-card home-cal-card">
              <div class="home-cal-header">
                <button class="home-cal-nav" onclick="homeCalNav(-1)">‹</button>
                <span class="home-cal-month" id="home-cal-month">Maio 2026</span>
                <button class="home-cal-nav" onclick="homeCalNav(1)">›</button>
              </div>
              <div class="home-cal-weekdays">
                <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
              </div>
              <div class="home-cal-days" id="home-cal-days"></div>
            </div>
          </div>

          <!-- COL 2: Post-its -->
          <div class="home-col home-col-mid">
            <div class="home-card home-postits-card">
              <div class="home-section-header">
                <h3>📝 Anotações</h3>
                <button class="home-btn-add" onclick="homeNovoPostit()">+ Novo</button>
              </div>
              <div class="home-postits-grid" id="home-postits-grid"></div>
            </div>
          </div>

          <!-- COL 3: Recados -->
          <div class="home-col home-col-right">
            <div class="home-card home-recados-card">
              <div class="home-section-header">
                <h3>📢 Avisos</h3>
                <span class="home-badge" id="home-recados-badge">0</span>
              </div>
              <div class="home-recados-list" id="home-recados-list">
                <div class="home-empty">Nenhum aviso no momento</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- MODAL AGENDA -->
      <div class="home-modal-overlay" id="home-agenda-overlay" onclick="homeFecharAgenda(event)">
        <div class="home-modal">
          <div class="home-modal-header">
            <h3 id="home-agenda-modal-titulo">Agenda — <span id="home-agenda-data-label"></span></h3>
            <button onclick="homeFecharAgenda(null, true)" class="home-modal-close">✕</button>
          </div>
          <div class="home-agenda-lista" id="home-agenda-lista"></div>
          <div class="home-agenda-form">
            <input type="hidden" id="home-agenda-id">
            <input type="text" id="home-agenda-titulo" placeholder="Título do compromisso" class="home-input">
            <div style="display:flex;gap:.5rem">
              <input type="time" id="home-agenda-inicio" class="home-input" placeholder="Início">
              <input type="time" id="home-agenda-fim" class="home-input" placeholder="Fim">
            </div>
            <textarea id="home-agenda-desc" placeholder="Descrição (opcional)" class="home-input" rows="2"></textarea>
            <div class="home-agenda-cores">
              <span>Cor:</span>
              <label><input type="radio" name="agenda-cor" value="#3d7f1f" checked> <span style="background:#3d7f1f" class="home-cor-dot"></span></label>
              <label><input type="radio" name="agenda-cor" value="#3b82f6"> <span style="background:#3b82f6" class="home-cor-dot"></span></label>
              <label><input type="radio" name="agenda-cor" value="#ef4444"> <span style="background:#ef4444" class="home-cor-dot"></span></label>
              <label><input type="radio" name="agenda-cor" value="#f59e0b"> <span style="background:#f59e0b" class="home-cor-dot"></span></label>
              <label><input type="radio" name="agenda-cor" value="#8b5cf6"> <span style="background:#8b5cf6" class="home-cor-dot"></span></label>
            </div>
            <div style="display:flex;gap:.5rem;justify-content:flex-end">
              <button class="home-btn-cancel" onclick="homeLimparAgendaForm()">Cancelar</button>
              <button class="home-btn-save" onclick="homeSalvarAgenda()">Salvar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- MODAL POST-IT -->
      <div class="home-modal-overlay" id="home-postit-overlay" onclick="homeFecharPostit(event)">
        <div class="home-modal home-postit-modal" id="home-postit-modal-inner">
          <div class="home-modal-header">
            <h3>📝 Anotação</h3>
            <button onclick="homeFecharPostit(null, true)" class="home-modal-close">✕</button>
          </div>
          <input type="hidden" id="home-postit-id">
          <input type="text" id="home-postit-titulo" placeholder="Título" class="home-input">
          <textarea id="home-postit-conteudo" placeholder="Escreva sua anotação..." class="home-input home-postit-textarea" rows="6"></textarea>
          <div class="home-postit-cores">
            <span>Cor:</span>
            <label><input type="radio" name="postit-cor" value="#fef08a" checked> <span style="background:#fef08a" class="home-cor-dot"></span></label>
            <label><input type="radio" name="postit-cor" value="#bbf7d0"> <span style="background:#bbf7d0" class="home-cor-dot"></span></label>
            <label><input type="radio" name="postit-cor" value="#bfdbfe"> <span style="background:#bfdbfe" class="home-cor-dot"></span></label>
            <label><input type="radio" name="postit-cor" value="#fecaca"> <span style="background:#fecaca" class="home-cor-dot"></span></label>
            <label><input type="radio" name="postit-cor" value="#e9d5ff"> <span style="background:#e9d5ff" class="home-cor-dot"></span></label>
            <label><input type="radio" name="postit-cor" value="#fed7aa"> <span style="background:#fed7aa" class="home-cor-dot"></span></label>
          </div>
          <div style="display:flex;gap:.5rem;justify-content:space-between;margin-top:.5rem">
            <button class="home-btn-cancel home-btn-danger" id="home-postit-del-btn" onclick="homeDeletarPostit()" style="display:none">🗑 Excluir</button>
            <div style="display:flex;gap:.5rem;margin-left:auto">
              <button class="home-btn-cancel" onclick="homeFecharPostit(null,true)">Cancelar</button>
              <button class="home-btn-save" onclick="homeSalvarPostit()">Salvar</button>
            </div>
          </div>
        </div>
      </div>

    </div>
