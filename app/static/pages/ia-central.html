<div class="page" id="page-ia-central">
      <!-- Universe canvas — renderizado via JS -->
      <canvas id="iaUniverse" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

      <div class="ia-central-layout">

        <!-- Header -->
        <div class="ia-central-header">
          <div style="display:flex;align-items:center;gap:.85rem">
            <div class="ia-avatar-wrap">
              <div class="ia-avatar-core">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 0 1 8 8v1a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-1a8 8 0 0 1 8-8z"/><path d="M9 21v-4a3 3 0 0 1 6 0v4"/><circle cx="9" cy="10" r="1"/><circle cx="15" cy="10" r="1"/></svg>
              </div>
              <div class="ia-avatar-ring"></div>
              <div class="ia-avatar-ring2"></div>
            </div>
            <div class="ia-header-info">
              <h3>IA Central</h3>
              <p>Assistente com acesso total ao sistema</p>
            </div>
          </div>
          <button class="ia-clear-btn" onclick="iaCentral.limpar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
            Limpar
          </button>
        </div>

        <!-- Sugestões rápidas -->
        <div class="ia-sugestoes" id="iaSugestoes">
          <div class="ia-sugestoes-label">Perguntas rápidas</div>
          <div style="display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center">
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Quantas mensagens foram enviadas hoje?')">📨 Envios hoje</button>
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Me mostra um gráfico de envios da semana')">📊 Gráfico da semana</button>
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Quantos contatos atendidos pelo chatbot esse mês?')">🤖 Chatbot do mês</button>
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Quais sessões WhatsApp estão conectadas?')">📱 Sessões ativas</button>
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Me mostra um resumo geral do sistema')">📋 Resumo geral</button>
            <button class="ia-sug-btn" onclick="iaCentral.sugerir('Quais campanhas tiveram mais falhas?')">⚠️ Campanhas com falha</button>
          </div>
        </div>

        <!-- Mensagens -->
        <div class="ia-msgs" id="iaMsgs"></div>

        <!-- Neural Loading -->
        <div class="ia-loading" id="iaLoading" style="display:none">
          <div class="ia-neural-loader">
            <div class="ia-neural-ring"></div>
            <div class="ia-neural-orbit"></div>
            <div class="ia-neural-orbit2"></div>
            <div class="ia-neural-core"></div>
          </div>
          <div class="ia-loading-text">
            <span>P</span><span>r</span><span>o</span><span>c</span><span>e</span><span>s</span><span>s</span><span>a</span><span>n</span><span>d</span><span>o</span><span>…</span>
          </div>
        </div>

        <!-- Input -->
        <div class="ia-input-bar">
          <textarea id="iaInput" class="ia-textarea" rows="1" placeholder="Pergunte qualquer coisa sobre o sistema…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();iaCentral.enviar()}"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button class="ia-send-btn" onclick="iaCentral.enviar()" title="Enviar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

      </div>
    </div>
