<div class="page" id="page-avaliacoes">

      <!-- Filtros de período — alinhados à direita abaixo da barra de título global -->
      <div style="display:flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;gap:.625rem;margin-bottom:1.5rem">
        <div style="display:flex;align-items:center;gap:.625rem;flex-wrap:wrap">
          <div style="display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.25rem;gap:.15rem">
            <button id="avalBtn7" onclick="setAvalDias(7)" class="btn btn-sm" style="border-radius:16px;font-size:.78rem;padding:.3rem .85rem;background:transparent;border:none;color:var(--text-mid)">7 dias</button>
            <button id="avalBtn30" onclick="setAvalDias(30)" class="btn btn-sm" style="border-radius:16px;font-size:.78rem;padding:.3rem .85rem;background:var(--accent);color:#fff;border:none">30 dias</button>
            <button id="avalBtn90" onclick="setAvalDias(90)" class="btn btn-sm" style="border-radius:16px;font-size:.78rem;padding:.3rem .85rem;background:transparent;border:none;color:var(--text-mid)">90 dias</button>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="loadAvaliacoes()" style="display:inline-flex;align-items:center;gap:.35rem">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Atualizar
          </button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem">

        <div class="stat-card card-purple">
          <span class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </span>
          <div class="label">Total Enviadas</div>
          <div class="value" id="avalKpiEnviadas">—</div>
        </div>

        <div class="stat-card card-green">
          <span class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </span>
          <div class="label">Respondidas</div>
          <div class="value" id="avalKpiRespondidas">—</div>
        </div>

        <div class="stat-card card-blue">
          <span class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          </span>
          <div class="label">Taxa de Resposta</div>
          <div class="value" id="avalKpiTaxa">—%</div>
        </div>

        <div class="stat-card card-red">
          <span class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </span>
          <div class="label">Média Geral</div>
          <div class="value" id="avalKpiMedia">—</div>
        </div>

      </div>

      <!-- Alerta de baixas notas (só aparece se houver notas ≤ 2) -->
      <div id="avalAlertaBaixas" style="display:none;background:linear-gradient(135deg,#fff5f5,#fee2e2);border:1.5px solid #fca5a5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem">
        <div style="display:flex;align-items:center;gap:.625rem;margin-bottom:.75rem">
          <span style="font-size:1.2rem">⚠️</span>
          <strong style="color:#b91c1c;font-size:.9rem" id="avalAlertaTexto">Avaliações com nota baixa</strong>
        </div>
        <div id="avalAlertaLista" style="display:flex;flex-direction:column;gap:.5rem"></div>
      </div>

      <!-- Grid inferior: Distribuição + Ranking -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">

        <!-- Distribuição por nota -->
        <div class="card" style="margin-bottom:0">
          <div class="section-header" style="margin-bottom:1.25rem">
            <div class="section-header-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
            <h2>Distribuição por Nota</h2>
          </div>
          <div id="avalDistribuicao" style="display:flex;flex-direction:column;gap:.75rem">
            <div style="text-align:center;padding:2rem;color:var(--text-mid)">Carregando…</div>
          </div>
        </div>

        <!-- Ranking por Vendedor -->
        <div class="card" style="margin-bottom:0">
          <div class="section-header" style="margin-bottom:1.25rem">
            <div class="section-header-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
            <h2>Ranking por Vendedor</h2>
          </div>
          <div id="avalRanking" style="display:flex;flex-direction:column;gap:.625rem">
            <div style="text-align:center;padding:2rem;color:var(--text-mid)">Carregando…</div>
          </div>
        </div>

      </div>

      <!-- Lista de Avaliações -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem">
          <div class="section-header" style="margin-bottom:0">
            <div class="section-header-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
            <h2>Todas as Avaliações</h2>
          </div>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button onclick="setAvalFiltro('todas')" id="avalFiltroTodas" class="btn btn-sm btn-primary" style="font-size:.78rem;border-radius:16px;padding:.3rem .85rem">Todas</button>
            <button onclick="setAvalFiltro('otimas')" id="avalFiltroOtimas" class="btn btn-sm btn-ghost" style="font-size:.78rem;border-radius:16px;padding:.3rem .85rem;color:#2d6a0a;border-color:var(--accent-mid)">⭐⭐⭐⭐⭐ Ótimas</button>
            <button onclick="setAvalFiltro('regulares')" id="avalFiltroRegulares" class="btn btn-sm btn-ghost" style="font-size:.78rem;border-radius:16px;padding:.3rem .85rem;color:#92400e;border-color:#fde68a">⭐⭐⭐ Regulares</button>
            <button onclick="setAvalFiltro('ruins')" id="avalFiltroRuins" class="btn btn-sm btn-ghost" style="font-size:.78rem;border-radius:16px;padding:.3rem .85rem;color:#b91c1c;border-color:#fecaca">⭐⭐ Ruins</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table id="avalTabela">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Telefone</th>
                <th>Vendedor</th>
                <th style="text-align:center">Nota</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody id="avalTbody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-mid);padding:2.5rem">Carregando…</td></tr>
            </tbody>
          </table>
        </div>
        <!-- Paginação -->
        <div id="avalPaginacao" style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
          <span id="avalPageInfo" style="font-size:.8rem;color:var(--text-mid)">—</span>
          <div style="display:flex;gap:.4rem">
            <button id="avalBtnAnterior" onclick="avalMudarPagina(-1)" class="btn btn-ghost btn-sm">← Anterior</button>
            <button id="avalBtnProximo" onclick="avalMudarPagina(1)" class="btn btn-ghost btn-sm">Próximo →</button>
          </div>
        </div>
      </div>

    </div>
