<div class="page" id="page-arquivo">


      <!-- Mini stats -->
      <div class="grid" style="grid-template-columns:repeat(5,1fr);gap:var(--gap);margin-bottom:var(--gap)" id="arquivoStats">
        <div class="stat-mini"><span class="si t-amber"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><div><div class="num" id="arqStNaFila">—</div><div class="lbl">Na fila</div></div></div>
        <div class="stat-mini"><span class="si t-green"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><div><div class="num" id="arqStEnviado">—</div><div class="lbl">Enviado</div></div></div>
        <div class="stat-mini"><span class="si t-blue"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/><polyline points="24 6 13 17 8 12"/></svg></span><div><div class="num" id="arqStEntregue">—</div><div class="lbl">Entregue</div></div></div>
        <div class="stat-mini"><span class="si t-violet"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span><div><div class="num" id="arqStVisual">—</div><div class="lbl">Visualizado</div></div></div>
        <div class="stat-mini"><span class="si t-red"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span><div><div class="num" id="arqStFalhou">—</div><div class="lbl">Falhou</div></div></div>
      </div>

  <div class="card pad">
    <div class="card-head">
      <span class="ci t-violet">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </span>
      <h2>Histórico de Envios</h2>
      <span class="grow"></span>
      <span style="font-size:12.5px;color:var(--text-3);display:inline-flex;align-items:center;gap:6px">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Auto-atualiza a cada 15s
      </span>
      <button class="btn ghost sm" id="btnRefreshArquivos" style="margin-left:12px">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Atualizar
      </button>
    </div>

    <!-- Legenda -->
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:12px 14px;background:var(--surface-2);border-radius:12px;margin-bottom:16px">
      <span style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text-3);margin-right:4px">LEGENDA</span>
      <span class="badge" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600"><span style="width:11px;height:11px;border-radius:50%;background:var(--amber);flex:none;box-shadow:0 0 0 3px var(--amber-bg)"></span> Na fila</span>
      <span class="badge" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600"><span style="width:11px;height:11px;border-radius:50%;background:var(--primary);flex:none;box-shadow:0 0 0 3px var(--primary-soft)"></span> Enviado</span>
      <span class="badge" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600"><span style="width:11px;height:11px;border-radius:50%;background:var(--blue);flex:none;box-shadow:0 0 0 3px var(--blue-bg)"></span> Entregue</span>
      <span class="badge" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600"><span style="width:11px;height:11px;border-radius:50%;background:var(--primary-deep);flex:none;box-shadow:0 0 0 3px var(--primary-soft)"></span> Visualizado</span>
      <span class="badge" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600"><span style="width:11px;height:11px;border-radius:50%;background:var(--red);flex:none;box-shadow:0 0 0 3px var(--red-bg)"></span> Falhou</span>
    </div>

    <div id="tbodyArquivos" class="grid" style="grid-template-columns:1fr;gap:12px">
      <div style="color:var(--text-3);text-align:center;padding:2rem">Carregando…</div>
    </div>
  </div>

  <!-- Modal de visualização do envio -->
  <div id="arqViewModal" class="arq-modal" style="display:none" onclick="if(event.target===this)arquivoModule.closeView()">
    <div class="arq-modal-box">
      <div class="arq-modal-head">
        <h3 id="arqViewTitle" style="margin:0;font-size:16px;font-weight:700">Detalhes do envio</h3>
        <span class="grow"></span>
        <a id="arqViewDownload" href="#" target="_blank" class="btn ghost sm" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Baixar
        </a>
        <button class="btn ghost sm" onclick="arquivoModule.closeView()" style="margin-left:8px">Fechar</button>
      </div>
      <div id="arqViewMeta" class="arq-modal-meta"></div>
      <div id="arqViewBody" class="arq-modal-body"></div>
    </div>
  </div>
</div>
