<div class="page" id="page-ctb-dashboard">

      <!-- Grid principal: coluna esquerda (cards + tabela) + coluna direita (feed tall) -->
      <div style="display:grid;grid-template-columns:1fr 300px;gap:1rem;align-items:start">

        <!-- COLUNA ESQUERDA -->
        <div style="display:flex;flex-direction:column;gap:1rem">

          <!-- Row 1: 3 stat cards -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">

            <!-- Card 1: Docs de Hoje -->
            <div class="stat-card card-green" style="cursor:default">
              <span class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </span>
              <div class="value" id="ctbDocsHoje">—</div>
              <div class="label">Documentos de Hoje</div>
              <div class="kpi-sub">recebidos via WhatsApp</div>
            </div>

            <!-- Card 2: Pendência de Revisão -->
            <div class="stat-card card-red" style="cursor:default">
              <span class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </span>
              <div class="value" id="ctbPendencias">—</div>
              <div class="label">Pendências de Revisão</div>
              <div class="kpi-sub">aguardando contador</div>
            </div>

            <!-- Card 3: Taxa OCR -->
            <div class="stat-card card-purple" style="cursor:default">
              <span class="stat-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="19" cy="5" r="3"/></svg>
              </span>
              <div class="value" id="ctbTaxaOcr">—%</div>
              <div class="label">Taxa de Acerto OCR</div>
              <div class="kpi-sub">precisão da extração por IA</div>
            </div>
          </div>

          <!-- Row 2: Tabela de documentos -->
          <div class="card" style="margin-bottom:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
              <div class="section-header" style="margin-bottom:0">
                <div class="section-header-icon shi-green">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <h2>Documentos Recebidos</h2>
              </div>
              <select id="ctbFiltroStatus" class="form-control" style="font-size:.8rem;padding:.3rem .6rem;height:auto" onchange="ctbDashboard.filtrar()">
                <option value="">Todos os status</option>
                <option value="recebido">Recebido</option>
                <option value="ocr_pendente">OCR Pendente</option>
                <option value="ocr_erro">Erro OCR</option>
                <option value="revisao_manual">Revisão Manual</option>
                <option value="aprovado">Aprovado</option>
              </select>
            </div>
            <div class="ctb-search-wrap" style="margin-bottom:.75rem">
              <svg class="ctb-search-ico" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="ctbDashSearch" class="ctb-search-input" placeholder="Buscar por empresa ou arquivo…" oninput="ctbDashboard.filtrarTexto(this.value)">
            </div>
            <div class="alert" id="alertCtbDashboard"></div>
            <div class="ctb-doc-table-wrap">
              <table class="ctb-doc-table">
                <thead>
                  <tr>
                    <th>Empresa</th>
                    <th>Arquivo</th>
                    <th>Recebido em</th>
                    <th>Status</th>
                    <th style="text-align:right">Ações</th>
                  </tr>
                </thead>
                <tbody id="ctbDocsTbody">
                  <tr><td colspan="5" class="ctb-table-empty">Carregando…</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div><!-- /coluna esquerda -->

        <!-- COLUNA DIREITA: Feed tall (ocupa toda a altura da grid) -->
        <div class="card ctb-feed-panel" style="margin-bottom:0;position:sticky;top:1rem">
          <div class="section-header" style="margin-bottom:.75rem">
            <div class="section-header-icon shi-purple">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <h2>Atividade Recente</h2>
          </div>
          <div class="ctb-feed-list" id="ctbFeedList">
            <div class="ctb-feed-empty">Carregando…</div>
          </div>
        </div>

      </div><!-- /grid principal -->
    </div>
