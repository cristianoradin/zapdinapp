<div class="page" id="page-ctb-dashboard">

  <!-- Group tabs -->
  <div class="wa-tabs cols-3">
    <button class="wa-tab" onclick="navigate('ctb-empresas')">
      <span class="wa-tab-ic"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></span>
      <span class="wa-tab-label">Cadastro de Empresas</span>
      <span class="wa-tab-go"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>
    <button class="wa-tab on" onclick="navigate('ctb-dashboard')">
      <span class="wa-tab-ic"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
      <span class="wa-tab-label">Gestão de Documentos</span>
      <span class="wa-tab-go"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></span>
    </button>
    <button class="wa-tab" onclick="navigate('ctb-arquivos')">
      <span class="wa-tab-ic"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
      <span class="wa-tab-label">Arquivados</span>
      <span class="wa-tab-go"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
    </button>
  </div>


      <!-- Grid principal: coluna esquerda (cards + tabela) + coluna direita (feed tall) -->
      <div style="display:grid;grid-template-columns:1fr 300px;gap:1rem;align-items:start">

        <!-- COLUNA ESQUERDA -->
        <div style="display:flex;flex-direction:column;gap:1rem">

          <!-- Row 1: 3 stat-mini cards -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem">

            <div class="stat-mini">
              <div class="si" style="background:var(--primary-soft);color:var(--primary-deep)">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </div>
              <div style="min-width:0">
                <div class="num" id="ctbDocsHoje">—</div>
                <div class="lbl">Documentos de Hoje</div>
                <div class="sub-mini">recebidos via WhatsApp</div>
              </div>
            </div>

            <div class="stat-mini">
              <div class="si" style="background:var(--red-bg);color:var(--red)">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </div>
              <div style="min-width:0">
                <div class="num" id="ctbPendencias" style="color:var(--red)">—</div>
                <div class="lbl">Pendências de Revisão</div>
                <div class="sub-mini">aguardando contador</div>
              </div>
            </div>

            <div class="stat-mini">
              <div class="si" style="background:var(--violet-bg);color:var(--violet)">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/><circle cx="19" cy="5" r="3"/></svg>
              </div>
              <div style="min-width:0">
                <div class="num" id="ctbTaxaOcr">—%</div>
                <div class="lbl">Taxa de Acerto OCR</div>
                <div class="sub-mini">precisão da extração por IA</div>
              </div>
            </div>
          </div>

          <!-- Row 2: Tabela de documentos -->
          <div class="card pad" style="margin-bottom:0">
            <div class="card-head" style="justify-content:space-between">
              <div style="display:flex;align-items:center;gap:.6rem">
                <span class="ci t-green">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </span>
                <h2 style="font-size:16px">Documentos Recebidos</h2>
              </div>
              <select id="ctbFiltroStatus" class="field" style="font-size:.8rem;padding:.3rem .6rem;height:auto;width:auto" onchange="ctbDashboard.filtrar()">
                <option value="">Todos os status</option>
                <option value="recebido">Recebido</option>
                <option value="ocr_pendente">OCR Pendente</option>
                <option value="ocr_erro">Erro OCR</option>
                <option value="revisao_manual">Revisão Manual</option>
                <option value="aprovado">Aprovado</option>
              </select>
            </div>
            <div class="ctb-search-wrap" style="margin-bottom:.75rem">
              <svg class="ctb-search-ico" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="ctbDashSearch" class="ctb-search-input" placeholder="Buscar por empresa ou arquivo…" oninput="ctbDashboard.filtrarTexto(this.value)">
            </div>
            <div class="alert" id="alertCtbDashboard"></div>
            <div class="ctb-doc-table-wrap">
              <table class="ctb-doc-table">
                <thead>
                  <tr>
                    <th>Empresa</th>
                    <th>Arquivo</th>
                    <th>Recebido em</th>
                    <th>Status</th>
                    <th style="text-align:right">Ações</th>
                  </tr>
                </thead>
                <tbody id="ctbDocsTbody">
                  <tr><td colspan="5" class="ctb-table-empty">Carregando…</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div><!-- /coluna esquerda -->

        <!-- COLUNA DIREITA: Feed tall (ocupa toda a altura da grid) -->
        <div class="card ctb-feed-panel" style="margin-bottom:0;position:sticky;top:1rem">
          <div class="card-head">
            <span class="ci t-violet">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            <h2 style="font-size:16px">Atividade Recente</h2>
          </div>
          <div class="ctb-feed-list" id="ctbFeedList">
            <div class="ctb-feed-empty">Carregando…</div>
          </div>
        </div>

      </div><!-- /grid principal -->
    </div>
