<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Avaliação de Atendimento — {{EMPRESA}}</title>
<style>
  :root {
    --primary: {{PRIMARY_COLOR}};
    --primary-strong: color-mix(in srgb, var(--primary) 100%, #000 16%);
    --primary-deep: color-mix(in srgb, var(--primary) 100%, #000 34%);
    --primary-soft: color-mix(in srgb, var(--primary) 14%, #fff);
    --text: #1a1d23;
    --text-2: #5b6b75;
    --text-3: #93a1ab;
    --border: #e4e6ea;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100dvh;
    background: linear-gradient(155deg, var(--primary-deep) 0%, var(--primary-strong) 50%, var(--primary) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 1.5rem 1rem .75rem;
    gap: 0;
  }
  .card {
    background: #fff;
    border-radius: 22px;
    padding: 2rem 1.75rem 1.85rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 22px 60px rgba(0,0,0,.28), 0 4px 16px rgba(0,0,0,.12);
    text-align: center;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popIn  { 0% { transform: scale(.5); opacity: 0; } 70% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
  .animate-in { animation: popIn .5s ease both .2s; }
  .icon-wrap { font-size: 3.5rem; line-height: 1; margin-bottom: 1rem; display: block; }
  .empresa-name {
    display: inline-block;
    color: var(--primary-deep);
    background: var(--primary-soft);
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .01em;
    padding: .42rem 1.1rem;
    border: 1.5px solid var(--primary);
    border-radius: 999px;
    margin-bottom: 1.1rem;
  }
  h1 {
    font-size: 1.55rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: .45rem;
    line-height: 1.25;
    letter-spacing: -.01em;
  }
  .vendedor { font-size: .9rem; color: var(--text-2); margin-bottom: .55rem; }
  .vendedor strong { color: var(--text); }
  .sub { font-size: .92rem; color: var(--text-2); line-height: 1.5; margin-bottom: 1.4rem; }
  .stars {
    display: flex;
    justify-content: center;
    gap: .35rem;
    margin-bottom: .55rem;
  }
  .star {
    background: none;
    border: none;
    cursor: pointer;
    padding: .15rem;
    border-radius: 8px;
    transition: transform .15s;
    color: #e4e6ea;
    line-height: 1;
  }
  .star svg { width: 42px; height: 42px; display: block; fill: currentColor; transition: color .15s, transform .15s; }
  .star:hover svg { transform: scale(1.12); }
  .star.active { color: var(--primary); }
  .star.active svg { transform: scale(1.15); }
  .star-labels {
    display: flex;
    justify-content: space-between;
    font-size: .72rem;
    color: var(--text-3);
    padding: 0 .35rem;
    margin-bottom: .9rem;
  }
  .nota-label { font-size: .92rem; font-weight: 700; color: var(--primary-deep); margin-bottom: .85rem; min-height: 1.2em; }
  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: .85rem 1rem;
    font-size: .9rem;
    font-family: inherit;
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color .15s, background .15s;
    margin-bottom: 1rem;
    background: #f6f8fa;
  }
  textarea:focus { border-color: var(--primary); background: #fff; }
  .btn-send {
    width: 100%;
    background: linear-gradient(90deg, var(--primary-strong), var(--primary));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: .95rem 1.5rem;
    font-size: 1.02rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    letter-spacing: .015em;
    box-shadow: 0 8px 22px color-mix(in srgb, var(--primary) 35%, transparent);
  }
  .btn-send:disabled { opacity: .42; cursor: not-allowed; box-shadow: none; }
  .btn-send:not(:disabled):hover { opacity: .94; transform: translateY(-1px); }
  .btn-send:not(:disabled):active { transform: translateY(0); }
  .msg-erro { color: var(--red); font-size: .85rem; margin-top: .55rem; }
  .powered { font-size: .72rem; color: rgba(255,255,255,.6); padding: 1rem 0 .25rem; text-align: center; }
  .powered-inner { font-size: .72rem; color: var(--text-3); margin-top: .9rem; }
</style>
</head>
<body>
  {{BODY_HTML}}
  <div class="powered">Powered by ZapDin</div>
<script>
  var _nota = 0;
  var _labels = ['', 'Péssimo 😞', 'Ruim 😕', 'Regular 😐', 'Bom 😊', 'Excelente 🤩'];
  function setStar(v) {
    _nota = v;
    document.querySelectorAll('.star').forEach(function(s) {
      s.classList.toggle('active', parseInt(s.dataset.v) <= v);
    });
    var lbl = document.getElementById('nota-val');
    if (lbl) { lbl.textContent = _labels[v]; lbl.style.display = 'block'; }
    var btn = document.getElementById('btnEnviar');
    if (btn) btn.disabled = false;
  }
  function enviarAvaliacao() {
    if (!_nota) return;
    var btn = document.getElementById('btnEnviar');
    var erro = document.getElementById('msgErro');
    btn.disabled = true;
    btn.textContent = 'Enviando…';
    if (erro) erro.style.display = 'none';
    var comentario = (document.getElementById('comentario') || {}).value || '';
    fetch('/api/avaliacao/responder', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: {{TOKEN_JS}}, nota: _nota, comentario: comentario})
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) {
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('thanksCard').style.display = 'block';
      } else {
        if (erro) { erro.textContent = d.detail || 'Erro ao enviar. Tente novamente.'; erro.style.display = 'block'; }
        btn.disabled = false;
        btn.textContent = 'Enviar Avaliação';
      }
    }).catch(function() {
      if (erro) { erro.textContent = 'Erro de conexão. Verifique sua internet.'; erro.style.display = 'block'; }
      btn.disabled = false;
      btn.textContent = 'Enviar Avaliação';
    });
  }
</script>
</body>
</html>
