<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapDin — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;550;600;650;700;750;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #25d366;
      --primary-strong: #1fb858;
      --primary-deep:   #128c4a;
      --primary-ghost:  rgba(37,211,102,.16);
      --surface:        #ffffff;
      --surface-2:      #f6f8fa;
      --surface-3:      #eef1f4;
      --bg:             #f4f6f9;
      --border:         #e4e6ea;
      --text:           #1a1d23;
      --text-2:         #5b6b75;
      --text-3:         #93a1ab;
      --text-mid:       #404a39;
      --text-light:     #717a67;
      --text-muted:     #6b7280;
      --red:            var(--red);
      --red-soft:       var(--red-bg);
      --font:           'Inter Tight', system-ui, -apple-system, sans-serif;
      --radius-xl:      14px;
      --radius-full:    9999px;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: grid;
      grid-template-columns: 46% 1fr;
      height: 100vh;
      width: 100%;
    }

    /* ── Lado esquerdo: branding ──────────────────────────────────────────── */
    .side-brand {
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, var(--primary) 0%, var(--primary-strong) 48%, var(--primary-deep) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; padding: 48px;
    }
    .side-brand .glow-a { position: absolute; width: 520px; height: 520px; border-radius: 50%; background: rgba(255,255,255,.10); filter: blur(20px); top: -180px; right: -160px; }
    .side-brand .glow-b { position: absolute; width: 420px; height: 420px; border-radius: 50%; background: rgba(0,0,0,.12); filter: blur(30px); bottom: -160px; left: -120px; }
    .side-brand .dots {
      position: absolute; inset: 0; opacity: .5;
      background-image: radial-gradient(rgba(255,255,255,.16) 1.4px, transparent 1.4px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000, transparent 75%);
              mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000, transparent 75%);
    }
    .logo-stack { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 22px; animation: rise .6s cubic-bezier(.2,.8,.3,1) both; }
    .rocket-logo {
      width: 280px; height: 280px;
      object-fit: contain;
      mix-blend-mode: multiply;
      -webkit-mask-image: radial-gradient(circle at center, #000 55%, transparent 78%);
              mask-image: radial-gradient(circle at center, #000 55%, transparent 78%);
      filter: drop-shadow(0 20px 40px rgba(0,0,0,.25));
    }
    .logo-word { font-size: 52px; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
    .logo-word b { font-weight: 800; }
    .logo-app { font-size: 30px; font-weight: 700; letter-spacing: .02em; opacity: .9; margin-top: -8px; }
    .brand-foot { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 1; font-size: 12.5px; opacity: .8; }

    /* ── Lado direito: formulário ─────────────────────────────────────────── */
    .side-form {
      background: var(--surface);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; position: relative;
    }

    .form-inner {
      width: 100%;
      max-width: 408px;
      animation: rise .6s .08s cubic-bezier(.2,.8,.3,1) both;
    }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; }
      .side-brand { display: none; }
    }

    /* Título */
    .form-title {
      margin: 0 0 4px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
      color: var(--text);
      text-wrap: balance;
    }
    .form-sub { color: var(--text-3); font-size: 14.5px; margin: 0 0 32px; }

    /* Campos */
    .form-fields { display: flex; flex-direction: column; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 11.5px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 9px;
    }

    .input-wrap { position: relative; display: flex; align-items: center; }

    .input-icon {
      position: absolute; left: 15px;
      color: var(--text-3);
      width: 19px; height: 19px;
      pointer-events: none; flex-shrink: 0;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%; height: 56px;
      border-radius: 15px; border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 0 48px;
      outline: none;
      transition: .16s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      background: var(--surface);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-ghost);
    }

    input::placeholder { color: var(--text-3); }

    /* Botão olho */
    .eye-btn {
      position: absolute; right: 10px;
      width: 36px; height: 36px;
      border-radius: 9px; border: none; background: transparent;
      color: var(--text-3); cursor: pointer;
      display: grid; place-items: center;
      transition: color .15s, background .15s;
    }
    .eye-btn:hover { color: var(--text-2); background: var(--surface-3); }
    .eye-btn svg { width: 19px; height: 19px; }

    /* Botão submit */
    .btn-login {
      width: 100%; height: 58px;
      border: none; border-radius: 15px; margin-top: 8px;
      background: linear-gradient(180deg, var(--primary), var(--primary-strong));
      color: #fff;
      font-family: var(--font);
      font-weight: 750; font-size: 16px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 16px 32px -14px var(--primary);
      transition: .16s;
      cursor: pointer;
    }
    .btn-login:hover:not(:disabled)  { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled              { opacity: .6; cursor: not-allowed; box-shadow: none; }
    .btn-login svg { width: 19px; height: 19px; }

    .btn-arrow { transition: transform .15s; }
    .btn-login:hover:not(:disabled) .btn-arrow { transform: translateX(4px); }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise { from { transform: translateY(14px); opacity: 0; } to { transform: none; opacity: 1; } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px var(--primary-ghost); } 50% { box-shadow: 0 0 0 7px transparent; } }

    /* Erro */
    .err {
      background: var(--red-soft);
      border: 1px solid color-mix(in srgb, var(--red) 25%, transparent);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--red);
      display: none;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* Rodapé */
    .form-foot {
      position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
    }
    .form-foot .footer-links {
      display: flex; gap: 26px; justify-content: center; margin-bottom: 10px;
    }
    .form-foot a { color: var(--text-2); font-size: 13.5px; font-weight: 600; text-decoration: none; }
    .form-foot a:hover { color: var(--primary-deep); }
    .form-foot p { color: var(--text-3); font-size: 12.5px; }

    /* Badge status (no topo do form) */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      height: 34px; padding: 0 14px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 13px; font-weight: 600;
      color: var(--text-2);
      margin-bottom: 28px;
      white-space: nowrap;
    }
    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-ghost);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<main>

  <!-- ── Lado esquerdo: branding ────────────────────────────────────────── -->
  <section class="side-brand">
    <div class="glow-a"></div>
    <div class="glow-b"></div>
    <div class="dots"></div>
    <div class="logo-stack">
      <img src="/logo/rocket-login.png" alt="ZapDin" class="rocket-logo" onerror="this.style.display='none'" />
      <div class="logo-word">Zap<b>Din</b></div>
      <div class="logo-app">App</div>
    </div>
    <div class="brand-foot">Plataforma de mensagens · v2.4</div>
  </section>

  <!-- ── Lado direito: formulário ──────────────────────────────────────── -->
  <section class="side-form">
    <div class="form-inner">

      <div class="badge" id="badge">
        <div class="badge-dot"></div>
        <span id="badge-text">Sistema online</span>
      </div>

      <h2 class="form-title" id="form-title">Bem-vindo de volta</h2>
      <p class="form-sub" id="form-sub" style="color:var(--text-3);font-size:.85rem;margin:-8px 0 8px;display:none"></p>

      <div class="form-fields">
        <div class="err" id="err"></div>

        <!-- Etapa 0: Token de ativação (primeira vez) -->
        <form id="tokenForm" novalidate style="display:none;contents">
          <div class="field">
            <label for="token-ativacao">Token de Ativação</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
              </svg>
              <input type="text" id="token-ativacao" placeholder="Cole o token do monitor aqui"
                autocomplete="off" autofocus style="font-family:monospace;letter-spacing:.05em" />
            </div>
          </div>
          <button type="submit" class="btn-login" id="btn-token">
            <div class="spinner" id="spinner-token"></div>
            <span id="btn-token-text">Ativar Sistema</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
          <button type="button" onclick="voltarLogin()"
            style="background:none;border:none;color:var(--text-3);font-size:.82rem;cursor:pointer;margin-top:4px;text-decoration:underline">
            ← Já tenho acesso, fazer login
          </button>
        </form>

        <!-- Etapa 1: CNPJ -->
        <form id="cnpjForm" novalidate style="display:contents">
          <div class="field" id="step-cnpj">
            <label for="cnpj">CNPJ do Cliente</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
              </svg>
              <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00"
                autocomplete="off" autofocus required maxlength="18" />
            </div>
          </div>
          <button type="submit" class="btn-login" id="btn-cnpj">
            <div class="spinner" id="spinner-cnpj"></div>
            <span id="btn-cnpj-text">Verificar CNPJ</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </form>

        <!-- Etapa 2: Usuário + Senha (oculto até CNPJ validado) -->
        <form id="loginForm" novalidate style="display:none;contents">
          <div class="field">
            <label for="username">Usuário</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="username" name="username" placeholder="Digite seu usuário"
                autocomplete="username" required />
            </div>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" name="password" placeholder="••••••••"
                autocomplete="current-password" required />
              <button type="button" class="eye-btn" onclick="togglePwd()" tabindex="-1" title="Mostrar/ocultar senha">
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn">
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">Entrar na ZapDin</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
          <button type="button" id="btn-voltar" onclick="voltarCnpj()"
            style="background:none;border:none;color:var(--text-3);font-size:.82rem;cursor:pointer;margin-top:4px;text-decoration:underline">
            ← Trocar CNPJ
          </button>
        </form>

        <!-- Seleção de empresa (multi-empresa) -->
        <div id="empresaForm" style="display:none">
          <p style="font-size:.85rem;color:var(--text-3);margin:0 0 .8rem">Selecione a empresa para acessar:</p>
          <div id="empresaLista" style="display:flex;flex-direction:column;gap:.5rem"></div>
          <button type="button" onclick="voltarLogin()"
            style="background:none;border:none;color:var(--text-3);font-size:.82rem;cursor:pointer;margin-top:1rem;text-decoration:underline">
            ← Trocar usuário
          </button>
        </div>

      </div>
    </div>

    <!-- Rodapé -->
    <div class="form-foot">
      <div class="footer-links">
        <a href="#">Suporte</a>
        <a href="#">Privacidade</a>
        <a href="#">Termos</a>
      </div>
      <p>© 2026 ZapDin. Sistema online.</p>
    </div>
  </section>

</main>

<script>
  function _fmtErr(data) {
    if (!data) return null;
    const d = data.detail;
    if (!d) return null;
    if (typeof d === 'string') return d;
    if (Array.isArray(d)) return d.map(e => e.msg || JSON.stringify(e)).join('; ');
    return JSON.stringify(d);
  }

  let _cnpjValidado = null;

  // Máscara CNPJ
  document.getElementById('cnpj').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 14);
    if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
    else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d+)$/, '$1.$2.$3/$4');
    else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d+)$/, '$1.$2.$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d+)$/, '$1.$2');
    this.value = v;
  });

  function togglePwd() {
    const inp = document.getElementById('password');
    const off = document.getElementById('eye-off');
    const on  = document.getElementById('eye-on');
    if (inp.type === 'password') { inp.type = 'text'; off.style.display = 'none'; on.style.display = 'block'; }
    else { inp.type = 'password'; off.style.display = 'block'; on.style.display = 'none'; }
  }

  function setLoading(v) {
    document.getElementById('btn').disabled          = v;
    document.getElementById('spinner').style.display = v ? 'block' : 'none';
    document.getElementById('btn-text').textContent  = v ? 'Entrando…' : 'Entrar na ZapDin';
  }

  function showForm(step) {
    document.getElementById('tokenForm').style.display = 'none';
    document.getElementById('cnpjForm').style.display  = 'none';
    document.getElementById('loginForm').style.display = 'none';
    const _ef = document.getElementById('empresaForm'); if (_ef) _ef.style.display = 'none';
    document.getElementById('err').style.display = 'none';
    if (step === 'token') {
      document.getElementById('tokenForm').style.display = 'contents';
      document.getElementById('form-title').textContent = 'Ativar Sistema';
      document.getElementById('form-sub').style.display = 'none';
      document.getElementById('token-ativacao').focus();
    } else if (step === 'cnpj') {
      document.getElementById('cnpjForm').style.display = 'contents';
      document.getElementById('form-title').textContent = 'Bem-vindo de volta';
      document.getElementById('form-sub').style.display = 'none';
      _cnpjValidado = null;
      document.getElementById('cnpj').focus();
    } else if (step === 'login') {
      document.getElementById('loginForm').style.display = 'contents';
      document.getElementById('username').focus();
    }
  }

  function voltarCnpj() { showForm('login'); }
  function voltarLogin() { showForm('login'); }

  // Verifica se empresa já está registrada → se não, faz auto-setup via backend
  fetch('/api/auth/empresa-info')
    .then(r => r.ok ? r.json() : null)
    .then(async d => {
      if (d && d.cnpj) {
        _cnpjValidado = d.cnpj;
        if (d.nome) document.getElementById('form-title').textContent = d.nome;
        showForm('login');
        return;
      }
      // Primeira abertura: registra empresa automaticamente usando o token do .env
      try {
        const r2 = await fetch('/api/auth/auto-setup', { method: 'POST' });
        const d2 = await r2.json().catch(() => ({}));
        if (r2.ok && d2.cnpj) {
          _cnpjValidado = d2.cnpj;
          if (d2.empresa) document.getElementById('form-title').textContent = d2.empresa;
          showForm('login');
          return;
        }
        // Auto-setup falhou — mostra erro sem pedir token manualmente
        const err = document.getElementById('err');
        err.textContent = d2.detail || 'Sistema não configurado. Contate o suporte.';
        err.style.display = 'block';
      } catch (e) {
        const err = document.getElementById('err');
        err.textContent = 'Não foi possível conectar ao servidor.';
        err.style.display = 'block';
      }
      showForm('login');
    })
    .catch(() => showForm('login'));

  // Etapa 0: Ativar com token
  document.getElementById('tokenForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';
    const token = document.getElementById('token-ativacao').value.trim();
    if (!token) { err.textContent = 'Informe o token de ativação.'; err.style.display = 'block'; return; }

    const btn = document.getElementById('btn-token');
    btn.disabled = true;
    document.getElementById('spinner-token').style.display = 'block';
    document.getElementById('btn-token-text').textContent = 'Ativando…';

    try {
      const res = await fetch('/api/auth/registrar-empresa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        _cnpjValidado = data.cnpj;
        document.getElementById('form-title').textContent = data.empresa || 'Bem-vindo';
        const sub = document.getElementById('form-sub');
        sub.textContent = `✓ ${data.empresa} ativada — ${data.usuarios_importados} usuário(s) importado(s)`;
        sub.style.display = 'block';
        showForm('login');  // vai direto para login, sem pedir CNPJ
      } else {
        err.textContent = _fmtErr(data) || 'Token inválido ou monitor inacessível.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      document.getElementById('spinner-token').style.display = 'none';
      document.getElementById('btn-token-text').textContent = 'Ativar Sistema';
    }
  });

  // Etapa 1: validar CNPJ
  document.getElementById('cnpjForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';

    const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
    if (cnpj.length !== 14) {
      err.textContent = 'Informe um CNPJ válido com 14 dígitos.';
      err.style.display = 'block';
      return;
    }

    const btnCnpj = document.getElementById('btn-cnpj');
    const spinnerCnpj = document.getElementById('spinner-cnpj');
    btnCnpj.disabled = true;
    spinnerCnpj.style.display = 'block';
    document.getElementById('btn-cnpj-text').textContent = 'Verificando…';

    try {
      const res = await fetch('/api/auth/check-cnpj', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cnpj }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        _cnpjValidado = cnpj;
        document.getElementById('form-title').textContent = data.nome || 'Acesso autorizado';
        const sub = document.getElementById('form-sub');
        sub.textContent = 'CNPJ: ' + document.getElementById('cnpj').value;
        sub.style.display = 'block';
        document.getElementById('cnpjForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'contents';
        document.getElementById('username').focus();
      } else {
        err.textContent = _fmtErr(data) || 'CNPJ não encontrado ou inativo.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
    } finally {
      btnCnpj.disabled = false;
      spinnerCnpj.style.display = 'none';
      document.getElementById('btn-cnpj-text').textContent = 'Verificar CNPJ';
    }
  });

  // Etapa 2: login com usuário/senha
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      err.textContent = 'Preencha usuário e senha.';
      err.style.display = 'block';
      return;
    }

    setLoading(true);
    _lastUser = username; _lastPass = password;
    try {
      // Etapa 1: valida credencial e descobre empresas vinculadas
      const res = await fetch('/api/auth/login-empresas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok) {
        if (data.multi === false) {
          // 1 empresa → já logado
          document.getElementById('btn-text').textContent = '✓ Redirecionando…';
          window.location.href = '/';
        } else {
          // N empresas → mostra seleção
          _mostrarSelecaoEmpresa(data.empresas || []);
          setLoading(false);
        }
      } else {
        err.textContent = _fmtErr(data) || 'Usuário ou senha incorretos.';
        err.style.display = 'block';
        setLoading(false);
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
      setLoading(false);
    }
  });

  // ── Multi-empresa: seleção ──────────────────────────────────────────────────
  let _lastUser = '', _lastPass = '';

  function _mostrarSelecaoEmpresa(empresas) {
    document.getElementById('loginForm').style.display  = 'none';
    document.getElementById('cnpjForm').style.display   = 'none';
    document.getElementById('form-title').textContent   = 'Escolha a empresa';
    const lista = document.getElementById('empresaLista');
    lista.innerHTML = empresas.map(e => `
      <button type="button" onclick="selecionarEmpresa(${e.empresa_id})"
        style="display:flex;align-items:center;gap:.7rem;width:100%;text-align:left;padding:.8rem 1rem;border:1px solid var(--border,#e4e6ea);border-radius:10px;background:#fff;cursor:pointer;transition:.15s"
        onmouseover="this.style.borderColor='var(--primary-deep)';this.style.background='#f0f7eb'"
        onmouseout="this.style.borderColor='var(--border,#e4e6ea)';this.style.background='#fff'">
        <span style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#4ea825,var(--primary-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${(e.nome||'?').slice(0,2).toUpperCase()}</span>
        <span style="min-width:0">
          <span style="display:block;font-weight:600;font-size:.9rem;color:#111318">${e.nome}</span>
          <span style="display:block;font-size:.75rem;color:var(--text-muted,#6b7280)">${e.cnpj||''}</span>
        </span>
      </button>`).join('');
    document.getElementById('empresaForm').style.display = 'block';
  }

  async function selecionarEmpresa(empresaId) {
    const err = document.getElementById('err');
    err.style.display = 'none';
    try {
      const res = await fetch('/api/auth/selecionar-empresa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: _lastUser, password: _lastPass, empresa_id: empresaId }),
      });
      if (res.ok) { window.location.href = '/'; }
      else {
        const data = await res.json().catch(() => ({}));
        err.textContent = _fmtErr(data) || 'Não foi possível acessar esta empresa.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
    }
  }

  window.selecionarEmpresa = selecionarEmpresa;

  // Badge dinâmico
  fetch('/api/stats')
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d) return;
      const n = d.sessoes_ativas ?? 0;
      document.getElementById('badge-text').textContent =
        n > 0 ? `${n} sessão${n > 1 ? 'ões' : ''} ativa${n > 1 ? 's' : ''}` : 'Sistema online';
    })
    .catch(() => {});
</script>
</body>
</html>
