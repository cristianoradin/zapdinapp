[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Mostra detalhes de falhas sem truncar
tb = short
# Silencia warnings de terceiros
filterwarnings =
    ignore::DeprecationWarning:uvicorn
    ignore::DeprecationWarning:asyncpg
