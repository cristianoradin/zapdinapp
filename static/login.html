<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapDin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #2f6c00;
      --primary-h:   #225100;
      --primary-soft:#f0f7eb;
      --surface:     #ffffff;
      --bg:          #f8f9ff;
      --border:      #c0cab4;
      --text:        #0b1c30;
      --text-mid:    #404a39;
      --text-light:  #717a67;
      --red:         #ba1a1a;
      --red-soft:    #ffdad6;
      --radius-xl:   0.75rem;
      --radius-full: 9999px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ── Lado esquerdo: branding ──────────────────────────────────────────── */
    .side-brand {
      display: none;
      width: 50%;
      background: var(--primary);
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      overflow: hidden;
    }

    @media (min-width: 1024px) {
      .side-brand { display: flex; }
    }

    /* Brilhos decorativos */
    .side-brand::before {
      content: '';
      position: absolute;
      top: -10%; right: -10%;
      width: 80%; height: 80%;
      background: radial-gradient(circle, rgba(161,249,105,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .side-brand::after {
      content: '';
      position: absolute;
      bottom: -5%; left: -5%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand-logo {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      height: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* ── Lado direito: formulário ─────────────────────────────────────────── */
    .side-form {
      width: 100%;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
    }

    @media (min-width: 1024px) {
      .side-form { width: 50%; }
    }

    .form-inner {
      width: 100%;
      max-width: 26rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* Título */
    .form-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }

    /* Campos */
    .form-fields { display: flex; flex-direction: column; gap: 1.5rem; }

    .field { display: flex; flex-direction: column; gap: 0.25rem; }

    label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-mid);
      text-transform: uppercase;
      margin-left: 4px;
    }

    .input-wrap { position: relative; display: flex; align-items: center; }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-light);
      width: 20px;
      height: 20px;
      pointer-events: none;
      flex-shrink: 0;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 14px 44px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      background: var(--surface);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47,108,0,.12);
    }

    input::placeholder { color: var(--border); }

    /* Botão olho */
    .eye-btn {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--text-light);
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--text-mid); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* Botão submit */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-xl);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 14px rgba(47,108,0,.25);
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .btn-login:hover:not(:disabled)  {
      background: var(--primary-h);
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(47,108,0,.3);
    }
    .btn-login:active:not(:disabled) { transform: scale(.97); }
    .btn-login:disabled               { opacity: .6; cursor: not-allowed; box-shadow: none; }

    .btn-arrow { transition: transform .15s; }
    .btn-login:hover:not(:disabled) .btn-arrow { transform: translateX(4px); }

    /* Spinner */
    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Erro */
    .err {
      background: var(--red-soft);
      border: 1px solid rgba(186,26,26,.25);
      border-radius: 0.5rem;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--red);
      display: none;
      line-height: 1.5;
    }

    /* Rodapé */
    footer {
      position: absolute;
      bottom: 2rem;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      text-decoration: underline;
      transition: color .15s;
    }
    .footer-links a:hover { color: var(--text); }

    footer p {
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
    }

    /* Badge status (mobile, no topo) */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font-size: 11.5px;
      color: var(--text-light);
      align-self: flex-start;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<main>

  <!-- ── Lado esquerdo: branding ────────────────────────────────────────── -->
  <section class="side-brand">
    <img
      src="/logo/Zapdin-removebg-preview.png"
      alt="ZapDin"
      class="brand-logo"
      onerror="this.style.opacity='.4'"
    />
  </section>

  <!-- ── Lado direito: formulário ──────────────────────────────────────── -->
  <section class="side-form">
    <div class="form-inner">

      <div class="badge" id="badge">
        <div class="badge-dot"></div>
        <span id="badge-text">Sistema online</span>
      </div>

      <h2 class="form-title" id="form-title">Bem-vindo de volta</h2>
      <p class="form-sub" id="form-sub" style="color:var(--text-muted);font-size:.85rem;margin:-8px 0 8px;display:none"></p>

      <div class="form-fields">
        <div class="err" id="err"></div>

        <!-- Etapa 0: Token de ativação (primeira vez) -->
        <form id="tokenForm" novalidate style="display:none;contents">
          <div class="field">
            <label for="token-ativacao">Token de Ativação</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
              </svg>
              <input type="text" id="token-ativacao" placeholder="Cole o token do monitor aqui"
                autocomplete="off" autofocus style="font-family:monospace;letter-spacing:.05em" />
            </div>
          </div>
          <button type="submit" class="btn-login" id="btn-token">
            <div class="spinner" id="spinner-token"></div>
            <span id="btn-token-text">Ativar Sistema</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
          <button type="button" onclick="voltarLogin()"
            style="background:none;border:none;color:var(--text-muted);font-size:.82rem;cursor:pointer;margin-top:4px;text-decoration:underline">
            ← Já tenho acesso, fazer login
          </button>
        </form>

        <!-- Etapa 1: CNPJ -->
        <form id="cnpjForm" novalidate style="display:contents">
          <div class="field" id="step-cnpj">
            <label for="cnpj">CNPJ do Cliente</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
              </svg>
              <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00"
                autocomplete="off" autofocus required maxlength="18" />
            </div>
          </div>
          <button type="submit" class="btn-login" id="btn-cnpj">
            <div class="spinner" id="spinner-cnpj"></div>
            <span id="btn-cnpj-text">Verificar CNPJ</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </form>

        <!-- Etapa 2: Usuário + Senha (oculto até CNPJ validado) -->
        <form id="loginForm" novalidate style="display:none;contents">
          <div class="field">
            <label for="username">Usuário</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="username" name="username" placeholder="Digite seu usuário"
                autocomplete="username" required />
            </div>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" name="password" placeholder="••••••••"
                autocomplete="current-password" required />
              <button type="button" class="eye-btn" onclick="togglePwd()" tabindex="-1" title="Mostrar/ocultar senha">
                <svg id="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg id="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn">
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">Entrar na ZapDin</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
          <button type="button" id="btn-voltar" onclick="voltarCnpj()"
            style="background:none;border:none;color:var(--text-muted);font-size:.82rem;cursor:pointer;margin-top:4px;text-decoration:underline">
            ← Trocar CNPJ
          </button>
        </form>

      </div>
    </div>

    <!-- Rodapé -->
    <footer>
      <div class="footer-links">
        <a href="#">Suporte</a>
        <a href="#">Privacidade</a>
        <a href="#">Termos</a>
      </div>
      <p>© 2024 ZapDin. Sistema online.</p>
    </footer>
  </section>

</main>

<script>
  function _fmtErr(data) {
    if (!data) return null;
    const d = data.detail;
    if (!d) return null;
    if (typeof d === 'string') return d;
    if (Array.isArray(d)) return d.map(e => e.msg || JSON.stringify(e)).join('; ');
    return JSON.stringify(d);
  }

  let _cnpjValidado = null;

  // Máscara CNPJ
  document.getElementById('cnpj').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 14);
    if (v.length > 12) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/, '$1.$2.$3/$4-$5');
    else if (v.length > 8) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d+)$/, '$1.$2.$3/$4');
    else if (v.length > 5) v = v.replace(/^(\d{2})(\d{3})(\d+)$/, '$1.$2.$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d+)$/, '$1.$2');
    this.value = v;
  });

  function togglePwd() {
    const inp = document.getElementById('password');
    const off = document.getElementById('eye-off');
    const on  = document.getElementById('eye-on');
    if (inp.type === 'password') { inp.type = 'text'; off.style.display = 'none'; on.style.display = 'block'; }
    else { inp.type = 'password'; off.style.display = 'block'; on.style.display = 'none'; }
  }

  function setLoading(v) {
    document.getElementById('btn').disabled          = v;
    document.getElementById('spinner').style.display = v ? 'block' : 'none';
    document.getElementById('btn-text').textContent  = v ? 'Entrando…' : 'Entrar na ZapDin';
  }

  function showForm(step) {
    document.getElementById('tokenForm').style.display = 'none';
    document.getElementById('cnpjForm').style.display  = 'none';
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('err').style.display = 'none';
    if (step === 'token') {
      document.getElementById('tokenForm').style.display = 'contents';
      document.getElementById('form-title').textContent = 'Ativar Sistema';
      document.getElementById('form-sub').style.display = 'none';
      document.getElementById('token-ativacao').focus();
    } else if (step === 'cnpj') {
      document.getElementById('cnpjForm').style.display = 'contents';
      document.getElementById('form-title').textContent = 'Bem-vindo de volta';
      document.getElementById('form-sub').style.display = 'none';
      _cnpjValidado = null;
      document.getElementById('cnpj').focus();
    } else if (step === 'login') {
      document.getElementById('loginForm').style.display = 'contents';
      document.getElementById('username').focus();
    }
  }

  function voltarCnpj() { showForm('cnpj'); }
  function voltarLogin() { showForm('cnpj'); }

  // Verifica se empresa já está registrada → define tela inicial
  fetch('/api/auth/empresa-info')
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (!d || !d.cnpj) showForm('token'); })
    .catch(() => {});

  // Etapa 0: Ativar com token
  document.getElementById('tokenForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';
    const token = document.getElementById('token-ativacao').value.trim();
    if (!token) { err.textContent = 'Informe o token de ativação.'; err.style.display = 'block'; return; }

    const btn = document.getElementById('btn-token');
    btn.disabled = true;
    document.getElementById('spinner-token').style.display = 'block';
    document.getElementById('btn-token-text').textContent = 'Ativando…';

    try {
      const res = await fetch('/api/auth/registrar-empresa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        const sub = document.getElementById('form-sub');
        sub.textContent = `✓ ${data.empresa} — ${data.usuarios_importados} usuário(s) importado(s)`;
        sub.style.display = 'block';
        showForm('cnpj');
        document.getElementById('form-sub').style.display = 'block';
        document.getElementById('form-sub').textContent = `✓ ${data.empresa} ativada com sucesso!`;
      } else {
        err.textContent = _fmtErr(data) || 'Token inválido ou monitor inacessível.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      document.getElementById('spinner-token').style.display = 'none';
      document.getElementById('btn-token-text').textContent = 'Ativar Sistema';
    }
  });

  // Etapa 1: validar CNPJ
  document.getElementById('cnpjForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';

    const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
    if (cnpj.length !== 14) {
      err.textContent = 'Informe um CNPJ válido com 14 dígitos.';
      err.style.display = 'block';
      return;
    }

    const btnCnpj = document.getElementById('btn-cnpj');
    const spinnerCnpj = document.getElementById('spinner-cnpj');
    btnCnpj.disabled = true;
    spinnerCnpj.style.display = 'block';
    document.getElementById('btn-cnpj-text').textContent = 'Verificando…';

    try {
      const res = await fetch('/api/auth/check-cnpj', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cnpj }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        _cnpjValidado = cnpj;
        document.getElementById('form-title').textContent = data.nome || 'Acesso autorizado';
        const sub = document.getElementById('form-sub');
        sub.textContent = 'CNPJ: ' + document.getElementById('cnpj').value;
        sub.style.display = 'block';
        document.getElementById('cnpjForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'contents';
        document.getElementById('username').focus();
      } else {
        err.textContent = _fmtErr(data) || 'CNPJ não encontrado ou inativo.';
        err.style.display = 'block';
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
    } finally {
      btnCnpj.disabled = false;
      spinnerCnpj.style.display = 'none';
      document.getElementById('btn-cnpj-text').textContent = 'Verificar CNPJ';
    }
  });

  // Etapa 2: login com usuário/senha
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    err.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      err.textContent = 'Preencha usuário e senha.';
      err.style.display = 'block';
      return;
    }

    setLoading(true);
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cnpj: _cnpjValidado, username, password }),
      });
      if (res.ok) {
        document.getElementById('btn-text').textContent = '✓ Redirecionando…';
        window.location.href = '/';
      } else {
        const data = await res.json().catch(() => ({}));
        err.textContent = _fmtErr(data) || 'Usuário ou senha incorretos.';
        err.style.display = 'block';
        setLoading(false);
      }
    } catch {
      err.textContent = 'Não foi possível conectar ao servidor.';
      err.style.display = 'block';
      setLoading(false);
    }
  });

  // Badge dinâmico
  fetch('/api/stats')
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (!d) return;
      const n = d.sessoes_ativas ?? 0;
      document.getElementById('badge-text').textContent =
        n > 0 ? `${n} sessão${n > 1 ? 'ões' : ''} ativa${n > 1 ? 's' : ''}` : 'Sistema online';
    })
    .catch(() => {});
</script>
</body>
</html>
